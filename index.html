<div id="root"></div>

<!-- Initialize Claude API with real Anthropic API -->
<script>
// Get API key from localStorage or environment
const getAPIKey = () => {
  let key = localStorage.getItem('ANTHROPIC_API_KEY');
  
  if (!key) {
    key = prompt('Enter your Anthropic API key (get one from https://console.anthropic.com/):');
    if (key) {
      localStorage.setItem('ANTHROPIC_API_KEY', key);
    }
  }
  
  return key;
};

window.claude = {
  complete: async function(input) {
    const apiKey = getAPIKey();
    
    if (!apiKey) {
      const errorMsg = 'Please provide your Anthropic API key to use SafeConnect AI and document analysis.';
      console.error('No API key provided');
      throw new Error(errorMsg);
    }

    const isMessages = typeof input === 'object' && input.messages;
    
    try {
      if (isMessages) {
        // Chat mode - use real Claude API
        const messages = input.messages;
        console.log('Sending chat request with messages:', messages);
        
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-opus-4-1-20250805',
            max_tokens: 300,
            system: `You are SafeConnect, the emotional support guide within SafeTrace AI. You are NOT a therapist or counselor. Your role: 1) Listen with genuine warmth and validation. 2) Help the user feel heard and understood. 3) Gently ask one follow-up question to help them process. 4) If you detect signs of crisis (self-harm mentions, hopelessness, acute danger), immediately prioritize safety. 5) Periodically remind them you can connect them with a real professional. Keep responses to 2-3 sentences. Be warm, human, concise. Never diagnose, never give clinical advice. Speak like a caring, wise friend.`,
            messages: messages.map(m => ({
              role: m.role,
              content: m.content
            }))
          })
        });

        console.log('API response status:', response.status);
        
        if (!response.ok) {
          const error = await response.json();
          console.error('API Error:', error);
          const msg = error.error?.message || JSON.stringify(error);
          throw new Error(`API Error (${response.status}): ${msg}`);
        }

        const data = await response.json();
        console.log('API response received:', data);
        return data.content[0].text;
      } else {
        // Document generation mode - use real Claude API
        const prompt = input;
        console.log('Sending document request');
        
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-opus-4-1-20250805',
            max_tokens: 2000,
            messages: [{
              role: 'user',
              content: prompt
            }]
          })
        });

        if (!response.ok) {
          const error = await response.json();
          console.error('API Error:', error);
          throw new Error(error.error?.message || 'API request failed');
        }

        const data = await response.json();
        return data.content[0].text;
      }
    } catch (error) {
      console.error('Claude API Error:', error);
      throw error;
    }
  }
};
</script>
